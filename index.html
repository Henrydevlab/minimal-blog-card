<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Minimal Blog Card - devChallenges">
    <meta name="description" content="Explore the beauty of simplicity with our guide on embracing minimalism in art and life." />
    <meta name="author" content="Annie Spratt" />
    <link
      rel="icon"
      href="resources/favicon.ico"
      type="image/x-icon"
      sizes="96x96"
    />
    <title>devChallenges.io | Minimal Blog Card</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="main-container">
        <article class="blog-card" aria-labelledby="card-title">
            <header class="card-header">
                <div class="image-wrapper" role="presentation">
                    <img src="resources/Cactus.jpg" alt="Cactus" class="cactus-img">
                </div>
            </header>
            
            <div class="card-content">
                <span class="tag">Design</span>
                <h2 id="card-title" class="title">Embracing Minimalism</h2>
                <p class="description">
                    From minimalist sculptures to minimalist paintings, this blog will inspire you to appreciate the beauty that lies in simplicity.
                </p>
            </div>
            
            <hr class="divider" aria-hidden="true">
            
            <footer class="card-footer">
                <span class="author">Annie Spratt</span>
            </footer>
        </article>

        <div class="author-info">
            Coded by <a href="#">Henry</a> | Challenge by
            <a href="https://www.devchallenges.io?ref=challenge" target="_blank">devChallenges.io</a>
        </div>
    </main>

</body>
</html>
